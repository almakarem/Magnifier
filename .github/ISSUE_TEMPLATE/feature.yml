name: Feature request
description: Suggest an enhancement or new capability for Magnifier.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! A short description of *what* you want and *why* you want it goes a long way.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: "Describe the use case in plain language. \"As a streamer doing close-up pixel work I want…\""
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: "What would the feature look like? A new hotkey? A setting? A new tab in Settings? Be as concrete as you like."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Workarounds you have tried, or features in other tools that do the same thing."

  - type: input
    id: priority
    attributes:
      label: How blocking is this for you?
      placeholder: "e.g. nice-to-have / would use daily / I can't use Magnifier without it"

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues for similar requests.
          required: true
